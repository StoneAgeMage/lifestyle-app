<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Masters Rowing — Training & Nutrition Plan</title>

  <!-- PWA manifest -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0a4f6e">

  <!-- iOS PWA support -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Rowing">
  <link rel="apple-touch-icon" href="icons/icon-192.png">

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

  <!-- Styles -->
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<!-- ===== APP BAR ===== -->
<div class="app-bar">
  <div class="app-bar-title">Masters Rowing</div>
  <button class="app-bar-settings" onclick="showSettings()">⚙ Settings</button>
</div>

<!-- ===== MAIN ===== -->
<div class="main">

  <!-- 5-tab bar -->
  <div class="tabs">
    <button id="tab-today" class="tab active" onclick="showPanel('today',this)">Execute</button>
    <button id="tab-plan"  class="tab" onclick="showPanel('plan',this)">Plan</button>
    <button id="tab-fuel"  class="tab" onclick="showPanel('fuel',this)">Fuel</button>
    <button id="tab-progress" class="tab" onclick="showPanel('progress',this)">Progress</button>
    <button id="tab-settings" class="tab" onclick="showPanel('settings',this)">Vitals</button>
  </div>

  <!-- ===== EXECUTE PANEL ===== -->
  <div class="panel active" id="panel-today">
    <div id="td-meal-nudge"></div>
    <div id="td-date-ctx"></div>
    <div id="td-workout"></div>
    <div id="td-meals"></div>

    <details id="td-log-lift" class="td-log-details card">
      <summary>Log Strength Session</summary>
      <div class="td-log-details-body">
        <div class="lf-row">
          <div class="lf-group">
            <label class="lf-label">Date</label>
            <input type="date" id="lf-date" class="lf-input">
          </div>
          <div class="lf-group">
            <label class="lf-label">Session</label>
            <select id="lf-session" class="lf-input">
              <option value="A">Lift A — Primary</option>
              <option value="A_bw">Lift A — Bodyweight</option>
              <option value="B">Lift B — Primary</option>
              <option value="B_bw">Lift B — Bodyweight</option>
            </select>
          </div>
        </div>
        <div class="lf-exercises" id="lf-exercises"></div>
        <div class="lf-row" style="margin-top:12px">
          <div class="lf-group" style="flex:2">
            <label class="lf-label">Session Notes (optional)</label>
            <input type="text" id="lf-notes" class="lf-input" placeholder="How it felt, any PRs, modifications...">
          </div>
          <div class="lf-group" style="flex:0 0 auto;align-self:flex-end">
            <button class="log-btn" onclick="saveLifting()">Save Session</button>
          </div>
        </div>
      </div>
    </details>

    <details id="td-log-erg" class="td-log-details card">
      <summary>Log Rowing Session</summary>
      <div class="td-log-details-body">
        <div class="lf-row">
          <div class="lf-group">
            <label class="lf-label">Date</label>
            <input type="date" id="ef-date" class="lf-input">
          </div>
          <div class="lf-group">
            <label class="lf-label">Session Type</label>
            <select id="ef-type" class="lf-input" onchange="updateErgFields()">
              <option value="z1">Zone 1 — Easy Aerobic</option>
              <option value="z2">Zone 2 — Moderate Aerobic</option>
              <option value="tt">6k Time Trial</option>
              <option value="at">Threshold / AT Intervals</option>
              <option value="vo2">VO2max Intervals</option>
              <option value="spd">Speed Pieces</option>
              <option value="cross">Cross-Training</option>
              <option value="recovery">Recovery / Flush</option>
            </select>
          </div>
          <div class="lf-group" id="ef-subtype-group">
            <label class="lf-label">Specific Session</label>
            <select id="ef-subtype" class="lf-input">
              <option value="5x1500">5 × 1500m</option>
              <option value="4x2000">4 × 2000m</option>
              <option value="3k-2.5k-2k">3k / 2.5k / 2k</option>
            </select>
          </div>
        </div>

        <div class="lf-row" id="ef-metrics-row">
          <div class="lf-group">
            <label class="lf-label">Total Distance (m)</label>
            <input type="number" id="ef-dist" class="lf-input" placeholder="e.g. 7500">
          </div>
          <div class="lf-group">
            <label class="lf-label">Total Time (mm:ss)</label>
            <input type="text" id="ef-time" class="lf-input" placeholder="e.g. 32:15">
          </div>
          <div class="lf-group">
            <label class="lf-label">Avg Split /500m</label>
            <input type="text" id="ef-split" class="lf-input" placeholder="e.g. 2:08">
          </div>
          <div class="lf-group">
            <label class="lf-label">Avg Stroke Rate</label>
            <input type="number" id="ef-rate" class="lf-input" placeholder="e.g. 22">
          </div>
        </div>

        <div class="lf-row" id="ef-reps-row" style="display:none">
          <div class="lf-group">
            <label class="lf-label">Rep Splits (comma-separated, mm:ss each)</label>
            <input type="text" id="ef-reps" class="lf-input" placeholder="e.g. 2:05, 2:06, 2:07, 2:06, 2:04">
          </div>
          <div class="lf-group">
            <label class="lf-label">Target Split /500m</label>
            <input type="text" id="ef-target" class="lf-input" placeholder="e.g. 2:06">
          </div>
        </div>

        <div class="lf-row" id="ef-cross-row" style="display:none">
          <div class="lf-group">
            <label class="lf-label">Activity</label>
            <input type="text" id="ef-activity" class="lf-input" placeholder="e.g. 5k run, 1hr tennis">
          </div>
          <div class="lf-group">
            <label class="lf-label">Duration</label>
            <input type="text" id="ef-duration" class="lf-input" placeholder="e.g. 45 min">
          </div>
        </div>

        <div class="lf-row">
          <div class="lf-group">
            <label class="lf-label">HR avg (optional)</label>
            <input type="number" id="ef-hr" class="lf-input" placeholder="Optional">
          </div>
          <div class="lf-group" style="flex:2">
            <label class="lf-label">Notes</label>
            <input type="text" id="ef-notes" class="lf-input" placeholder="Conditions, how it felt, crew notes...">
          </div>
          <div class="lf-group" style="flex:0 0 auto;align-self:flex-end">
            <button class="log-btn" onclick="saveErg()">Save Session</button>
          </div>
        </div>
      </div>
    </details>
  </div>

  <!-- ===== PLAN PANEL ===== -->
  <div class="panel" id="panel-plan">
    <div id="plan-weeks"></div>
  </div>

  <!-- ===== FUEL PANEL ===== -->
  <div class="panel" id="panel-fuel">
    <div id="meal-planner-view"></div>
  </div>

  <!-- ===== PROGRESS PANEL ===== -->
  <div class="panel" id="panel-progress">
    <div id="prg-content"></div>
  </div>

  <!-- ===== VITALS PANEL ===== -->
  <div class="panel" id="panel-settings"></div>

</div><!-- /.main -->

<!-- ===== DAY MODAL ===== -->
<div class="modal-overlay" id="modal" onclick="closeModal(event)">
  <div class="modal">
    <button class="modal-close" onclick="closeModalDirect()">✕</button>
    <div class="modal-date" id="m-date"></div>
    <div class="modal-dow" id="m-dow"></div>
    <div class="modal-section">
      <h4>Training</h4>
      <div id="m-workout"></div>
    </div>
    <div class="modal-section">
      <h4>Meals Today</h4>
      <div id="m-meals"></div>
    </div>
  </div>
</div>


<!-- ===== SCRIPTS — order matters ===== -->
<!-- 0. Storage layer -->
<script src="js/storage.js"></script>
<!-- 1. Structured data catalogs + engine -->
<script src="js/data-ingredients.js"></script>
<script src="js/data-recipes.js"></script>
<script src="js/data-workouts.js"></script>
<script src="js/data-blocks.js"></script>
<script src="js/data-mobility.js"></script>
<script src="js/data-training-plans.js"></script>
<script src="js/engine.js"></script>
<!-- 2. Feature modules -->
<script src="js/calendar.js"></script>
<script src="js/workouts.js"></script>
<script src="js/meals.js"></script>
<script src="js/log.js"></script>
<script src="js/settings.js"></script>
<script src="js/dashboard.js"></script>
<script src="js/vitals.js"></script>
<script src="js/meal-planner.js"></script>
<script src="js/progress.js"></script>
<!-- 3. App entry point -->
<script src="js/app.js"></script>

<!-- ===== SERVICE WORKER REGISTRATION ===== -->
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', function () {
      navigator.serviceWorker.register('service-worker.js')
        .then(function (registration) {
          console.log('[SW] Registered. Scope:', registration.scope);
        })
        .catch(function (error) {
          console.warn('[SW] Registration failed:', error);
        });
    });
  }
</script>

</body>
</html>
